<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="90" height="90">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1F3C"/>
      <stop offset="100%" stop-color="#080C10"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="g2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C48C" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00C48C"/>
      <stop offset="70%" stop-color="#00C48C"/>
      <stop offset="100%" stop-color="#00C48C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="90" height="90" rx="18" fill="url(#bg)"/>
  <rect width="90" height="90" rx="18" fill="url(#glow2)"/>

  <!-- Hex outline -->
  <polygon points="45,7 72,22 72,52 45,67 18,52 18,22"
    fill="none" stroke="#00D4FF" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Peak fill -->
  <path d="M45,17 L64,60 H26 Z" fill="url(#pf)"/>
  <!-- Peak stroke -->
  <path d="M45,17 L64,60 H26 Z" fill="none"
    stroke="#00D4FF" stroke-width="2" stroke-linejoin="round" filter="url(#g2)"/>

  <!-- Green crossbar -->
  <line x1="33" y1="50" x2="57" y2="50" stroke="url(#lg2)" stroke-width="1.6"/>
  <circle cx="33" cy="50" r="2" fill="#00C48C"/>
  <circle cx="57" cy="50" r="2" fill="#00C48C"/>

  <!-- Peak tip -->
  <circle cx="45" cy="17" r="3.5" fill="#00D4FF" filter="url(#g2)"/>
  <circle cx="45" cy="17" r="1.8" fill="#ffffff"/>
</svg>
